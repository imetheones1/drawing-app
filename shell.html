<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drawing App</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #000000;
        }

        canvas.emscripten {
            border: 0 none;
            background-color: #000000;
            width: 100%;
            height: 100%;
            display: block;
        }
        
        #mobile-keyboard-helper {
            position: absolute;
            top: -100px;
            left: -100px;
            opacity: 0;
            font-size: 16px; 
            pointer-events: none;
        }
    </style>
</head>
<body>
    <input type="text" id="mobile-keyboard-helper" autocomplete="off" autocapitalize="none" spellcheck="false">
    <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>

    <script type='text/javascript'>
        var Module = {
            canvas: (function() {
                var canvas = document.getElementById('canvas');
                return canvas;
            })()
        };

        window.addEventListener('DOMContentLoaded', () => {
            const helper = document.getElementById('mobile-keyboard-helper');
            const canvas = document.getElementById('canvas');

            helper.addEventListener('input', (e) => {
                if (e.data) {
                    const textEvent = new Event('textInput', { bubbles: true });
                    textEvent.data = e.data;
                    canvas.dispatchEvent(textEvent);
                }
                helper.value = '';
            });

            helper.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' || e.key === 'Enter') {
                    const keyEvent = new KeyboardEvent('keydown', {
                        key: e.key,
                        code: e.code,
                        keyCode: e.keyCode,
                        bubbles: true
                    });
                    canvas.dispatchEvent(keyEvent);
                }
            });
        });
    </script>
    
    {{{ SCRIPT }}}
</body>
</html>
