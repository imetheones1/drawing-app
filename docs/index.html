<!doctypehtml><html lang=en><head><meta charset=utf-8><meta content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"name=viewport><title>Drawing App</title><style>body,html{margin:0;padding:0;width:100vw;height:100vh;overflow:hidden;background-color:#000}canvas.emscripten{border:0 none;background-color:#000;width:100%;height:100%;display:block}#mobile-keyboard-helper{position:absolute;top:-100px;left:-100px;opacity:0;font-size:16px;pointer-events:none}</style></head><body><input autocapitalize=none autocomplete=off id=mobile-keyboard-helper spellcheck=false><canvas class=emscripten id=canvas oncontextmenu=event.preventDefault() tabindex=-1></canvas><script>var Module={canvas:document.getElementById("canvas")};window.addEventListener("DOMContentLoaded",(()=>{const e=document.getElementById("mobile-keyboard-helper"),t=document.getElementById("canvas");e.addEventListener("input",(n=>{if(n.data){const e=new Event("textInput",{bubbles:!0});e.data=n.data,t.dispatchEvent(e)}e.value=""})),e.addEventListener("keydown",(e=>{if("Backspace"===e.key||"Enter"===e.key){const n=new KeyboardEvent("keydown",{key:e.key,code:e.code,keyCode:e.keyCode,bubbles:!0});t.dispatchEvent(n)}}))}))</script><script async src=drawingapp.js></script></body></html>
